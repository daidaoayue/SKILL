# Auto-generated by weekly-report-writer init at first run.
# Edit roots / ignore freely; re-run skill to pick up changes.

[project]
name = ""
display_name = ""
short_name = ""
domain = ""             # one-line domain description (e.g. "雷达目标识别 / 多模态融合")
advisor = ""            # advisor title for greeting (e.g. "陈老师")
student = ""            # student name for signature (e.g. "李越")
phd_year = 1

[buckets.code]
roots = []
ignore = ["__pycache__", "dist", "build_tmp", ".pytest_cache"]
include_extensions = [".py", ".cpp", ".h", ".cu"]
content_diff_size_kb = 200
sha1_for_content_diff = true

[buckets.experiment_data]
roots = []
ignore = ["raw_data/**", "dataset/**", "*.mat", "*.npy", "*.h5"]
include_extensions = [".json", ".csv", ".tsv"]
extract_metrics = true

[buckets.paper]
roots = []
ignore = [".aux", ".log", ".out", ".synctex.gz", "*.bak"]
include_extensions = [".tex", ".md", ".docx"]
section_diff = true

[buckets.reading]
roots = []
include_extensions = [".md", ".pdf"]

[buckets.theory]
roots = []
include_extensions = [".md", ".tex", ".ipynb"]
detect_math_in_paper = true
section_diff = true

[buckets.figures]
roots = []
include_extensions = [".png", ".jpg", ".jpeg", ".svg", ".pdf"]
sample_strategy = "newest_3"
max_per_report = 5
max_size_mb = 5

[checkpoint_signal]
enabled = true
roots = []
filename_patterns = [
  '_acc_(?P<acc>[\d.]+)',
  '_epoch_?(?P<epoch>\d+)',
  '_seed_?(?P<seed>\d+)',
  '_loss_(?P<loss>[\d.]+)',
]
ignore_content = true

[metrics]
hint_tokens_extra = []
config_keys_extra = []
multi_seed_aggregate = true
ci_field = "ci_95"

[scanner]
exclude_globs_global = [
  "__pycache__/**", "*.pyc", ".pytest_cache/**",
  "dist/**", "build/**", "build_tmp/**",
  ".idea/**", ".vscode/**",
  "*~", "*_tmp.*", "*_temp.*",
  ".weekly_report/**",
]
follow_symlinks = false
include_hidden = false
metadata_only_size_mb = 10
